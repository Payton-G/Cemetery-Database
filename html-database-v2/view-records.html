<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Records - Memorial Park Cemetery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <img src="assets/images/jrotc-logo.png" alt="Moberly JROTC Logo" class="jrotc-logo">
                <div class="header-text">
                    <h1>Memorial Park Cemetery Database</h1>
                    <p class="subtitle">View All Records</p>
                </div>
            </div>
        </header>

        <nav class="main-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="data-entry.html" class="nav-link">Data Entry</a>
            <a href="view-records.html" class="nav-link active">View Records</a>
            <a href="search.html" class="nav-link">Search</a>
            <a href="cemetery-map.html" class="nav-link">Map</a>
            <a href="import-data.html" class="nav-link">Import</a>
        </nav>

        <main>
            <section class="records-section">
                <div class="records-header">
                    <h2>All Records</h2>
                    <div class="records-controls">
                        <input type="text" id="filter-input" placeholder="Filter records..." class="filter-input">
                        <select id="sort-select" class="sort-select">
                            <option value="name">Sort by Name</option>
                            <option value="date">Sort by Entry Date</option>
                            <option value="veteran">Veterans First</option>
                            <option value="condition">Sort by Condition</option>
                        </select>
                        <button id="export-btn" class="btn btn-secondary">Export Data</button>
                    </div>
                </div>

                <div id="records-count" class="records-count"></div>

                <div id="records-container" class="records-container">
                    <!-- Records will be loaded here -->
                </div>

                <div id="pagination-container" class="pagination-container" style="display: none;">
                    <!-- Pagination controls will be loaded here -->
                </div>

                <div id="no-records" class="no-records" style="display: none;">
                    <p>No records found. <a href="data-entry.html">Add your first record</a> to get started!</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2025 Memorial Park Cemetery Restoration Project | JROTC Veterans List<br>Created by C/MSG Payton M. Goodger</p>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script src="js/view-records.js"></script>
</body>
</html>
